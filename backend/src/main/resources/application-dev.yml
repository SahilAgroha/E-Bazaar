spring:
  datasource:
    # Use the Supabase Transaction Pooler URL for better performance on Render
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver # Updated for PostgreSQL

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 10000        # 10 sec
      max-lifetime: 30000        # 30 sec (VERY IMPORTANT)
      connection-timeout: 30000
      keepalive-time: 15000 
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
#        default_schema: buybaazar

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
 # Email configuration for local/dev testing
#  mail:
#    host: smtp.gmail.com
#    port: 587
#    username: ${MAIL_USER}
#    password: ${MAIL_PASS}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true

app:
  cors:
    # Allows React frontend to communicate with Backend
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  razorpay:
    # Test credentials for local development
    api-key: ${RAZORPAY_KEY}
    api-secret: ${RAZORPAY_SECRET}
  stripe:
    # Test credential for local development
    secret-key: ${STRIPE_SECRET}

server:
  # Standard port for local backend testing
  port: 8080


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always