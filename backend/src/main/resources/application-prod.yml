#    password: ${MAIL_PASS}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true
#          connectiontimeout: 5000
#          timeout: 5000
#          writetimeout: 5000

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
  razorpay:
    api-key: ${RAZORPAY_KEY}
    api-secret: ${RAZORPAY_SECRET}
  stripe:
    secret-key: ${STRIPE_SECRET}

server:
  # Render automatically injects the PORT variable
  port: ${PORT:8080}