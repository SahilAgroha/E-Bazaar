spring:
  datasource:
    # Use the Supabase Transaction Pooler URL for better performance on Render
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver # Updated for PostgreSQL

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: ${JPA_SHOW_SQL:false}
    # Specify PostgreSQL dialect for Hibernate


  mail:
    host: smtp.sendgrid.net
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
